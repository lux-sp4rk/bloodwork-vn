name: Ren'Py Lint

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - 'game/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    container: renpy/renpy:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Ren'Py scripts
        run: |
          for f in game/*.rpy; do
            renpy-lint "$f" 2>&1 || true
          done
        continue-on-error: true
