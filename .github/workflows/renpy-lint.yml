name: Ren'Py Lint

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - 'game/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Ren'Py SDK
        run: |
          mkdir -p renpy-sdk
          curl -L "https://www.renpy.org/dl/8.5.2/renpy-8.5.2-sdk.tar.bz2" \
            -o renpy-sdk.tar.bz2
          tar xf renpy-sdk.tar.bz2 -C renpy-sdk --strip-components=1
          echo "SDK ready"

      - name: Lint game scripts
        run: |
          for f in game/*.rpy; do
            echo "=== Linting: $f ==="
            python3 "renpy-sdk/renpy.py" lint "$f" 2>&1 || true
          done
        continue-on-error: true